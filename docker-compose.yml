version: '3.8'

services:
  free-claude-code:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: free-claude-code
    restart: always
    ports:
      - "8082:8082"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      # Si necesitas que el contenedor interactúe con repositorios específicos del VPS, 
      # puedes mapear carpetas del host aquí:
      # - /ruta/a/tus/proyectos:/app/projects
    networks:
      - fcc-network

networks:
  fcc-network:
    driver: bridge